<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事例記事自動生成ツール</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        /* アップロード画面 */
        .upload-section {
            text-align: center;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px 20px;
            margin: 30px 0;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f0f0;
        }

        .upload-area.dragover {
            border-color: #50c878;
            background: #e8f5e9;
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 18px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .upload-hint {
            font-size: 14px;
            color: #7f8c8d;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #95a5a6;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
            box-shadow: 0 8px 20px rgba(149, 165, 166, 0.4);
        }

        /* 処理中画面 */
        .processing-section {
            display: none;
            text-align: center;
        }

        .processing-section.active {
            display: block;
        }

        .step-list {
            list-style: none;
            margin: 30px 0;
            text-align: left;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .step-item {
            padding: 20px;
            margin: 15px 0;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .step-item.completed {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .step-item.processing {
            background: #e3f2fd;
            color: #1976d2;
        }

        .step-icon {
            font-size: 24px;
        }

        .step-text {
            flex: 1;
            font-size: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 結果表示画面 */
        .result-section {
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #7f8c8d;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            line-height: 1.8;
        }

        .tab-content.active {
            display: block;
        }

        .transcript-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .article-content h2 {
            color: #667eea;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 24px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }

        .article-content h2:first-child {
            margin-top: 0;
        }

        .article-content h3 {
            color: #764ba2;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .article-content p {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .article-content ul, .article-content ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .article-content li {
            margin-bottom: 8px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn-icon {
            margin-right: 8px;
        }

        .error-message {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        .error-message.active {
            display: block;
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .content {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .upload-area {
                padding: 40px 15px;
            }

            .upload-icon {
                font-size: 48px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                margin: 5px 0;
            }

            .tab-content {
                max-height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 事例記事自動生成ツール</h1>
            <p>インタビュー音声をアップロードして、自動で事例記事を生成します</p>
        </div>

        <div class="content">
            <!-- エラーメッセージ -->
            <div class="error-message" id="errorMessage"></div>

            <!-- アップロード画面 -->
            <div class="upload-section" id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">ドラッグ&ドロップ</div>
                    <div class="upload-hint">またはクリックしてファイルを選択</div>
                    <div class="upload-hint" style="margin-top: 10px;">対応形式: MP3, WAV</div>
                </div>
                <input type="file" id="fileInput" class="file-input" accept="audio/mpeg,audio/wav,audio/mp3,.mp3,.wav">
                <button class="btn" onclick="document.getElementById('fileInput').click()">
                    📁 ファイルを選択
                </button>
            </div>

            <!-- 処理中画面 -->
            <div class="processing-section" id="processingSection">
                <h2>処理中...</h2>
                <ul class="step-list">
                    <li class="step-item" id="stepUpload">
                        <span class="step-icon">📤</span>
                        <span class="step-text">ファイルアップロード</span>
                    </li>
                    <li class="step-item" id="stepTranscribe">
                        <span class="step-icon">🔄</span>
                        <span class="step-text">文字起こし処理中...</span>
                    </li>
                    <li class="step-item" id="stepGenerate">
                        <span class="step-icon">⏳</span>
                        <span class="step-text">記事生成待機中...</span>
                    </li>
                </ul>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- 結果表示画面 -->
            <div class="result-section" id="resultSection">
                <h2 style="text-align: center; margin-bottom: 20px;">✅ 処理完了！</h2>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('transcript')">文字起こし</button>
                    <button class="tab" onclick="switchTab('article')">生成記事</button>
                </div>

                <div class="tab-content active" id="transcriptTab">
                    <div class="transcript-content" id="transcriptContent"></div>
                </div>

                <div class="tab-content" id="articleTab">
                    <div class="article-content" id="articleContent"></div>
                </div>

                <div class="action-buttons">
                    <button class="btn" onclick="copyToClipboard()">
                        <span class="btn-icon">📋</span>コピー
                    </button>
                    <button class="btn" onclick="downloadArticle()">
                        <span class="btn-icon">💾</span>ダウンロード
                    </button>
                    <button class="btn btn-secondary" onclick="resetApp()">
                        <span class="btn-icon">📁</span>新しいファイル
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // グローバル変数
        let currentTranscript = '';
        let currentArticle = '';

        // DOM要素の取得
        const uploadSection = document.getElementById('uploadSection');
        const processingSection = document.getElementById('processingSection');
        const resultSection = document.getElementById('resultSection');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const errorMessage = document.getElementById('errorMessage');

        // ファイルアップロード処理
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('dragleave', handleDragLeave);
        uploadArea.addEventListener('drop', handleDrop);
        fileInput.addEventListener('change', handleFileSelect);

        function handleDragOver(e) {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                processFile(file);
            }
        }

        function processFile(file) {
            // ファイル形式チェック
            const validTypes = ['audio/mpeg', 'audio/wav', 'audio/mp3'];
            const validExtensions = ['.mp3', '.wav'];
            const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
            
            if (!validTypes.includes(file.type) && !validExtensions.includes(fileExtension)) {
                showError('対応していないファイル形式です。MP3またはWAV形式のファイルを選択してください。');
                return;
            }

            // エラーメッセージを非表示
            hideError();

            // アップロード画面を非表示、処理中画面を表示
            uploadSection.style.display = 'none';
            processingSection.classList.add('active');

            // 処理を開始
            startProcessing(file);
        }

        async function startProcessing(file) {
            // ステップ1: アップロード完了
            updateStep('stepUpload', 'completed', '✓', 'ファイルアップロード完了');
            updateProgress(33);

            // 少し待機（実際のアップロード処理をシミュレート）
            await sleep(1000);

            // ステップ2: 文字起こし処理
            updateStep('stepTranscribe', 'processing', '🔄', '文字起こし処理中...');
            updateProgress(50);

            // 疑似文字起こし処理
            const transcript = await mockTranscribe(file);
            currentTranscript = transcript;
            updateStep('stepTranscribe', 'completed', '✓', '文字起こし完了');
            updateProgress(66);

            // ステップ3: 記事生成処理
            updateStep('stepGenerate', 'processing', '🔄', '記事生成中...');
            updateProgress(80);

            // 疑似記事生成処理
            const article = await mockGenerateArticle(transcript);
            currentArticle = article;
            updateStep('stepGenerate', 'completed', '✓', '記事生成完了');
            updateProgress(100);

            // 少し待機してから結果画面を表示
            await sleep(500);
            showResults();
        }

        function updateStep(stepId, status, icon, text) {
            const step = document.getElementById(stepId);
            step.className = `step-item ${status}`;
            step.querySelector('.step-icon').textContent = icon;
            step.querySelector('.step-text').textContent = text;
        }

        function updateProgress(percentage) {
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function showResults() {
            processingSection.classList.remove('active');
            resultSection.classList.add('active');
            
            // 文字起こし結果を表示
            document.getElementById('transcriptContent').textContent = currentTranscript;
            
            // 記事を表示
            document.getElementById('articleContent').innerHTML = formatArticle(currentArticle);
        }

        // 疑似文字起こし処理（後でAPIに置き換え可能）
        async function mockTranscribe(file) {
            // 実際の実装では、ここでWhisper APIなどを呼び出す
            await sleep(2000); // 処理時間をシミュレート
            
            // ダミーの文字起こし結果
            return `【インタビュー文字起こし結果】

インタビュアー: 本日はお忙しい中、お時間をいただきありがとうございます。まず、御社の現状について教えていただけますか？

回答者: はい、ありがとうございます。当社は製造業を営んでおり、従来は紙ベースの業務プロセスが中心でした。しかし、業務効率の低下や人的ミスの増加が課題となっていました。

インタビュアー: 具体的にはどのような課題があったのでしょうか？

回答者: 主な課題は3つあります。1つ目は、紙の管理に時間がかかりすぎることです。2つ目は、情報共有が遅れること。3つ目は、データの検索性が低いことです。これらの課題により、業務時間が30%も増加していました。

インタビュアー: その課題を解決するために、どのようなソリューションを導入されたのでしょうか？

回答者: デジタル化ソリューションを導入しました。具体的には、クラウドベースの業務管理システムを導入し、すべてのプロセスをデジタル化しました。これにより、リアルタイムでの情報共有が可能になり、検索性も大幅に向上しました。

インタビュアー: 導入後の効果はいかがでしたか？

回答者: 導入後、業務時間が50%削減され、人的ミスも80%減少しました。また、情報共有のスピードが向上し、意思決定が迅速になりました。コスト面でも、年間で約30%の削減を実現できました。

インタビュアー: 今後はどのような展開を予定されていますか？

回答者: 今後は、AIを活用したさらなる業務効率化を検討しています。また、他部署への展開も計画しており、全社的なデジタル化を推進していきます。`;
        }

        // 疑似記事生成処理（後でAPIに置き換え可能）
        async function mockGenerateArticle(transcript) {
            // 実際の実装では、ここでClaude APIやGPT APIを呼び出す
            await sleep(2000); // 処理時間をシミュレート
            
            // テンプレートベースの記事生成（実際はAIで生成）
            return {
                lead: '製造業を営む企業様が、デジタル化ソリューションを導入し、業務効率を大幅に改善した事例をご紹介します。紙ベースの業務プロセスから脱却し、クラウドベースの業務管理システムを導入することで、業務時間の削減とコスト削減を実現しました。',
                challenge: {
                    title: '課題',
                    content: '従来の紙ベースの業務プロセスでは、以下の3つの課題がありました。',
                    items: [
                        {
                            title: '課題1: 紙の管理に時間がかかりすぎる',
                            content: '紙の管理に多くの時間を費やしており、本来の業務に集中できない状況でした。'
                        },
                        {
                            title: '課題2: 情報共有が遅れる',
                            content: '情報共有に時間がかかり、意思決定が遅れることが多々ありました。'
                        },
                        {
                            title: '課題3: データの検索性が低い',
                            content: '必要な情報を見つけるのに時間がかかり、業務効率が低下していました。'
                        }
                    ],
                    impact: 'これらの課題により、業務時間が30%も増加していました。'
                },
                solution: {
                    title: '解決策',
                    content: 'この課題を解決するため、クラウドベースの業務管理システムを導入しました。',
                    features: [
                        'すべてのプロセスをデジタル化',
                        'リアルタイムでの情報共有が可能',
                        '検索性の大幅な向上'
                    ]
                },
                effect: {
                    title: '効果・成果',
                    content: '導入後、以下のような効果が得られました。',
                    quantitative: [
                        '業務時間: 50%削減',
                        '人的ミス: 80%減少',
                        'コスト: 年間30%削減'
                    ],
                    qualitative: [
                        '情報共有のスピードが向上',
                        '意思決定が迅速に',
                        '業務効率が大幅に改善'
                    ]
                },
                summary: {
                    title: 'まとめ',
                    content: 'デジタル化ソリューションの導入により、業務効率とコスト削減を実現しました。今後は、AIを活用したさらなる業務効率化を検討しており、全社的なデジタル化を推進していく予定です。'
                }
            };
        }

        function formatArticle(article) {
            let html = '';
            
            // リード文
            html += `<p style="font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #667eea;">${article.lead}</p>`;
            
            // 課題
            html += `<h2>${article.challenge.title}</h2>`;
            html += `<p>${article.challenge.content}</p>`;
            article.challenge.items.forEach(item => {
                html += `<h3>${item.title}</h3>`;
                html += `<p>${item.content}</p>`;
            });
            html += `<p><strong>${article.challenge.impact}</strong></p>`;
            
            // 解決策
            html += `<h2>${article.solution.title}</h2>`;
            html += `<p>${article.solution.content}</p>`;
            html += `<h3>導入した機能</h3>`;
            html += `<ul>`;
            article.solution.features.forEach(feature => {
                html += `<li>${feature}</li>`;
            });
            html += `</ul>`;
            
            // 効果・成果
            html += `<h2>${article.effect.title}</h2>`;
            html += `<p>${article.effect.content}</p>`;
            html += `<h3>定量的な成果</h3>`;
            html += `<ul>`;
            article.effect.quantitative.forEach(item => {
                html += `<li>${item}</li>`;
            });
            html += `</ul>`;
            html += `<h3>定性的な成果</h3>`;
            html += `<ul>`;
            article.effect.qualitative.forEach(item => {
                html += `<li>${item}</li>`;
            });
            html += `</ul>`;
            
            // まとめ
            html += `<h2>${article.summary.title}</h2>`;
            html += `<p>${article.summary.content}</p>`;
            
            return html;
        }

        function switchTab(tabName) {
            // タブの切り替え
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (tabName === 'transcript') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('transcriptTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('articleTab').classList.add('active');
            }
        }

        function copyToClipboard() {
            const activeTab = document.querySelector('.tab-content.active');
            const text = activeTab.id === 'transcriptTab' 
                ? currentTranscript 
                : activeTab.innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('クリップボードにコピーしました！');
            }).catch(err => {
                console.error('コピーに失敗しました:', err);
                alert('コピーに失敗しました。');
            });
        }

        function downloadArticle() {
            const content = currentArticle ? formatArticle(currentArticle) : currentTranscript;
            const text = document.createElement('div');
            text.innerHTML = content;
            const plainText = text.innerText || text.textContent;
            
            const blob = new Blob([plainText], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '事例記事_' + new Date().toISOString().slice(0, 10) + '.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function resetApp() {
            uploadSection.style.display = 'block';
            processingSection.classList.remove('active');
            resultSection.classList.remove('active');
            fileInput.value = '';
            currentTranscript = '';
            currentArticle = '';
            hideError();
            
            // ステップをリセット
            updateStep('stepUpload', '', '📤', 'ファイルアップロード');
            updateStep('stepTranscribe', '', '🔄', '文字起こし処理中...');
            updateStep('stepGenerate', '', '⏳', '記事生成待機中...');
            updateProgress(0);
        }

        function showError(message) {
            errorMessage.textContent = '⚠️ ' + message;
            errorMessage.classList.add('active');
        }

        function hideError() {
            errorMessage.classList.remove('active');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
    </script>
</body>
</html>
