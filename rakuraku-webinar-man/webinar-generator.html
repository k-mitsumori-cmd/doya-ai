<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webinar準備ツール</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #667eea;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .instructor-list {
            margin-top: 15px;
        }

        .instructor-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
            align-items: center;
        }

        .instructor-item input {
            padding: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #95a5a6;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-success {
            background: #27ae60;
        }

        .btn-success:hover {
            background: #229954;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }

        .generate-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .result-section {
            display: none;
            margin-top: 30px;
        }

        .result-section.active {
            display: block;
        }

        .result-content {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 8px;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.8;
            font-size: 14px;
        }

        .result-content h2 {
            color: #667eea;
            margin-top: 25px;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 8px;
        }

        .result-content h2:first-child {
            margin-top: 0;
        }

        .result-content h3 {
            color: #764ba2;
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .error-message {
            display: none;
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        .error-message.active {
            display: block;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
        }

        .info-box p {
            margin: 0;
            color: #1565c0;
            font-size: 14px;
        }

        /* ローディングアニメーション */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
        }

        .loading-subtext {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .content {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .instructor-item {
                grid-template-columns: 1fr;
            }

            .generate-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 ラクラクWebinarマン</h1>
            <p>Webinarの準備に必要な各種ドキュメントを自動生成</p>
        </div>

        <div class="content">
            <div class="error-message" id="errorMessage"></div>

            <!-- お試し入力ボタン（上部） -->
            <div class="form-section" style="background: #f0f4ff; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
                <div style="text-align: center;">
                    <h3 style="color: #667eea; margin-bottom: 15px;">🎲 お試し入力</h3>
                    <p style="color: #666; margin-bottom: 15px; font-size: 14px; line-height: 1.8;">
                        お試し入力はここからできます<br>
                        <span style="font-weight: 600;">内容を作りたい方は、イベント内容をこちらに基本情報の欄含め入力してください</span>
                    </p>
                    <p style="color: #888; margin-bottom: 20px; font-size: 13px;">AIが様々なビジネスジャンルのサンプルデータを自動生成します</p>
                    <button type="button" class="btn" onclick="fillSampleData()" style="font-size: 18px; padding: 15px 40px;">
                        🎲 お試し入力（AI生成）
                    </button>
                </div>
            </div>

            <form id="webinarForm">
                <!-- 基本情報 -->
                <div class="form-section">
                    <h2>📅 基本情報</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>開催日付 *</label>
                            <input type="date" id="eventDate" required>
                        </div>
                        <div class="form-group">
                            <label>開始時刻 *</label>
                            <input type="time" id="startTime" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>終了時刻 *</label>
                            <input type="time" id="endTime" required>
                        </div>
                        <div class="form-group">
                            <label>タイムゾーン</label>
                            <select id="timezone">
                                <option value="JST">JST (日本標準時)</option>
                                <option value="UTC">UTC</option>
                                <option value="PST">PST (太平洋標準時)</option>
                                <option value="EST">EST (東部標準時)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Zoom招待URL *</label>
                        <input type="url" id="zoomUrl" placeholder="https://zoom.us/j/..." required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>ミーティングID</label>
                            <input type="text" id="meetingId" placeholder="例: 123 456 7890">
                        </div>
                        <div class="form-group">
                            <label>パスコード</label>
                            <input type="text" id="passcode" placeholder="例: 123456">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Webinarテーマ *</label>
                        <input type="text" id="theme" placeholder="例: AI活用による業務効率化" required>
                    </div>
                </div>

                <!-- 主催者・講師情報（複数名対応） -->
                <div class="form-section">
                    <h2>👤 主催者・講師情報</h2>
                    <div class="info-box">
                        <p>💡 複数の講師がいる場合は「+ 講師を追加」ボタンで追加できます</p>
                    </div>
                    <div class="form-group">
                        <button type="button" class="btn btn-secondary btn-small" onclick="addInstructor()">+ 講師を追加</button>
                        <div class="instructor-list" id="instructorList"></div>
                    </div>
                </div>

                <!-- 台本テンプレート -->
                <div class="form-section">
                    <h2>📝 台本情報</h2>
                    <div class="form-group">
                        <label>どんなセミナーなのか *</label>
                        <textarea id="seminarDescription" placeholder="例: 最新のAI技術を活用して、業務効率を50%向上させる実践的な方法を、具体的な事例を交えながら解説します。参加者には実際に使えるツールやフレームワークを提供します。" required></textarea>
                    </div>
                </div>

                <!-- その他 -->
                <div class="form-section">
                    <h2>📊 その他情報</h2>
                    <div class="form-group">
                        <label>アンケートURL</label>
                        <input type="url" id="surveyUrl" placeholder="https://forms.google.com/...">
                    </div>
                    <div class="form-group">
                        <label>主催組織名</label>
                        <input type="text" id="companyName" placeholder="例: 株式会社○○">
                    </div>
                </div>

                <!-- 生成ボタン -->
                <div class="form-section">
                    <h2>📄 ドキュメント生成</h2>
                    <div class="info-box">
                        <p>💡 必要なドキュメントを個別に生成・ダウンロードできます</p>
                    </div>
                    <div class="generate-buttons">
                        <button type="button" class="generate-btn" onclick="generateBasicInfo()">
                            📅 基本情報
                        </button>
                        <button type="button" class="generate-btn" onclick="generateScript()">
                            📝 台本
                        </button>
                        <button type="button" class="generate-btn" onclick="generateInvitationEmail()">
                            📧 招待メール
                        </button>
                        <button type="button" class="generate-btn" onclick="generateThankYouEmail()">
                            🙏 ありがとうメール
                        </button>
                        <button type="button" class="generate-btn" onclick="generateInternalChat()">
                            💬 社内共有チャット
                        </button>
                    </div>
                </div>

                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">
                        🔄 リセット
                    </button>
                </div>
            </form>

            <!-- 結果表示 -->
            <div class="result-section" id="resultSection">
                <h2 style="text-align: center; margin-bottom: 20px; color: #667eea;" id="resultTitle">✅ ドキュメント生成完了！</h2>
                <div class="result-content" id="resultContent"></div>
                <div class="action-buttons">
                    <button type="button" class="btn" onclick="regenerateCurrentDocument()">
                        🔄 再生成
                    </button>
                    <button type="button" class="btn" onclick="copyToClipboard()">
                        📋 コピー
                    </button>
                    <button type="button" class="btn btn-success" onclick="downloadCurrentDocument()">
                        💾 ダウンロード
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="hideResult()">
                        ← 戻る
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ローディングオーバーレイ -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">AIが生成中<span class="loading-dots">...</span></div>
        <div class="loading-subtext" id="loadingSubtext">ドキュメントを作成しています</div>
    </div>

    <script>
        let instructorCount = 0;
        let currentDocument = '';
        let currentDocumentType = '';

        function addInstructor() {
            instructorCount++;
            const list = document.getElementById('instructorList');
            const item = document.createElement('div');
            item.className = 'instructor-item';
            item.id = `instructor-${instructorCount}`;
            item.innerHTML = `
                <input type="text" placeholder="名前 *" class="instructor-name" required>
                <input type="text" placeholder="役職" class="instructor-title">
                <input type="text" placeholder="所属組織" class="instructor-org">
                <button type="button" class="btn btn-danger btn-small" onclick="removeInstructor(${instructorCount})">削除</button>
            `;
            list.appendChild(item);
        }

        function removeInstructor(id) {
            const item = document.getElementById(`instructor-${id}`);
            if (item) {
                item.remove();
            }
        }

        function getInstructors() {
            const items = document.querySelectorAll('.instructor-item');
            const instructors = [];
            items.forEach((item) => {
                const name = item.querySelector('.instructor-name').value.trim();
                const title = item.querySelector('.instructor-title').value.trim();
                const org = item.querySelector('.instructor-org').value.trim();
                if (name) {
                    instructors.push({
                        name: name,
                        title: title || '',
                        org: org || ''
                    });
                }
            });
            return instructors;
        }

        function formatDate(dateString) {
            if (!dateString) return '[日付未入力]';
            const date = new Date(dateString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            const weekday = weekdays[date.getDay()];
            return `${year}年${month}月${day}日(${weekday})`;
        }

        function formatTime(timeString) {
            if (!timeString) return '[時刻未入力]';
            return timeString;
        }

        function calculateDuration(startTime, endTime) {
            if (!startTime || !endTime) return '';
            const start = new Date(`2000-01-01T${startTime}`);
            const end = new Date(`2000-01-01T${endTime}`);
            const diff = (end - start) / (1000 * 60);
            if (diff < 60) return `${diff}分`;
            const hours = Math.floor(diff / 60);
            const minutes = diff % 60;
            return minutes > 0 ? `${hours}時間${minutes}分` : `${hours}時間`;
        }

        function validateRequiredFields() {
            const requiredFields = ['eventDate', 'startTime', 'endTime', 'zoomUrl', 'theme', 'seminarDescription'];
            for (const fieldId of requiredFields) {
                const field = document.getElementById(fieldId);
                if (!field.value.trim()) {
                    showError(`必須項目「${field.previousElementSibling.textContent}」が入力されていません。`);
                    return false;
                }
            }

            const instructors = getInstructors();
            if (instructors.length === 0) {
                showError('講師を1名以上追加してください。');
                return false;
            }

            return true;
        }

        // AI風の文章生成関数
        function generateAIContent(prompt, context) {
            // 実際のAI API連携用のプレースホルダー
            // 現在は高度な生成ロジックで実装
            // 将来的にAI API（Claude API等）に置き換え可能
            
            // コンテキストを分析して適切な文章を生成
            const theme = context.theme || '';
            const description = context.seminarDescription || '';
            const instructors = context.instructors || [];
            
            // テーマからキーワードを抽出
            const keywords = extractKeywords(theme + ' ' + description);
            
            // 生成ロジック（実際のAI APIに置き換え可能）
            return generateContentFromContext(prompt, context, keywords);
        }

        function extractKeywords(text) {
            // 簡単なキーワード抽出（実際のAIでは不要）
            const commonWords = ['の', 'を', 'に', 'は', 'が', 'で', 'と', 'も', 'から', 'まで'];
            const words = text.split(/[\s、。]/).filter(w => w.length > 1 && !commonWords.includes(w));
            return words.slice(0, 10);
        }

        function generateContentFromContext(prompt, context, keywords) {
            // プロンプトとコンテキストに基づいて内容を生成
            // 実際のAI APIでは、この部分をAPI呼び出しに置き換える
            
            // 現在は高度な生成ロジックで実装
            // 将来的に: return await callAIAPI(prompt, context);
            
            return generateIntelligentContent(prompt, context);
        }

        function generateIntelligentContent(type, context) {
            // タイプに応じて適切な内容を生成
            switch(type) {
                case 'basic-info-description':
                    return generateBasicInfoDescription(context);
                case 'script-opening':
                    return generateScriptOpening(context);
                case 'script-intro':
                    return generateScriptIntro(context);
                case 'script-main':
                    return generateScriptMain(context);
                case 'script-closing':
                    return generateScriptClosing(context);
                case 'email-invitation':
                    return generateInvitationEmailContent(context);
                case 'email-thankyou':
                    return generateThankYouEmailContent(context);
                case 'chat-internal':
                    return generateInternalChatContent(context);
                default:
                    return '';
            }
        }

        function generateBasicInfoDescription(context) {
            const theme = context.theme;
            const description = context.seminarDescription;
            const instructors = context.instructors;
            
            let content = `本Webinarでは、「${theme}」をテーマに、実践的で価値のある情報をお届けします。\n\n`;
            content += `${description}\n\n`;
            
            if (instructors.length > 0) {
                const instructorNames = instructors.map(i => i.name).join('、');
                content += `${instructorNames}が、豊富な経験と専門知識を活かして、わかりやすく丁寧に解説いたします。\n\n`;
            }
            
            content += `参加者の皆様には、以下のような価値を提供します：\n`;
            content += `- 最新の知識と実践的なスキル\n`;
            content += `- 具体的な事例やケーススタディ\n`;
            content += `- 質疑応答による疑問解消\n`;
            content += `- 後日配布される資料による復習機会\n\n`;
            
            return content;
        }

        function generateScriptOpening(context) {
            const theme = context.theme;
            const description = context.seminarDescription;
            const instructors = context.instructors;
            const instructorNames = instructors.map(i => i.name).join('、');
            const instructorTitles = instructors.filter(i => i.title).map(i => `${i.name}（${i.title}）`).join('、') || instructorNames;
            
            // AI風に自然な挨拶を生成
            const greetingVariations = [
                `本日はお忙しい中、このWebinarにご参加いただき、誠にありがとうございます。\n`,
                `本日はお時間をいただき、このWebinarにご参加いただき、ありがとうございます。\n`,
                `本日は貴重なお時間をいただき、このWebinarにご参加いただき、誠にありがとうございます。\n`
            ];
            let content = greetingVariations[Math.floor(Math.random() * greetingVariations.length)];
            content += `\n`;
            
            // 自然な講師紹介を生成
            const introVariations = [
                `講師を務めさせていただきます${instructorTitles}です。\n`,
                `${instructorTitles}が講師を務めさせていただきます。\n`,
                `本日の講師は${instructorTitles}です。\n`
            ];
            content += introVariations[Math.floor(Math.random() * introVariations.length)];
            content += `\n`;
            
            // 自然なテーマ紹介を生成
            const themeVariations = [
                `本日のテーマは「${theme}」です。\n`,
                `本日は「${theme}」についてお話しさせていただきます。\n`,
                `本日のWebinarでは「${theme}」をテーマに進めていきます。\n`
            ];
            content += themeVariations[Math.floor(Math.random() * themeVariations.length)];
            content += `\n`;
            content += `${description}\n\n`;
            
            // 自然な内容紹介を生成
            const contentIntroVariations = [
                `本日は、${instructorNames}が、実践的で役立つ内容をわかりやすくお伝えしていきます。\n`,
                `${instructorNames}が、実務に活かせる内容をわかりやすく解説していきます。\n`,

        function showResult(content, title, type) {
            currentDocument = content;
            currentDocumentType = type;
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            const resultTitle = document.getElementById('resultTitle');
            resultTitle.textContent = `✅ ${title}生成完了！`;
            resultContent.textContent = content;
            resultSection.classList.add('active');
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(currentDocument).then(() => {
                alert('クリップボードにコピーしました！');
            }).catch(err => {
                console.error('コピーに失敗しました:', err);
                alert('コピーに失敗しました。');
            });
        }

        function downloadCurrentDocument() {
            const blob = new Blob([currentDocument], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const date = document.getElementById('eventDate').value || new Date().toISOString().slice(0, 10);
            const typeNames = {
                'basic-info': '基本情報',
                'script': '台本',
                'invitation-email': '招待メール',
                'thank-you-email': 'ありがとうメール',
                'internal-chat': '社内共有チャット'
            };
            a.download = `Webinar_${typeNames[currentDocumentType] || 'ドキュメント'}_${date}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

            const typeFunctions = {
                'basic-info': generateBasicInfo,
                'script': generateScript,
                'invitation-email': generateInvitationEmail,
